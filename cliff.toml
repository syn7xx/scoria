[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | upper_first | trim_end }}\
{% if commit.breaking %} (**BREAKING**){% endif %}
{% endfor %}\
{% endfor %}
"""
footer = """

{% for release in releases -%}
{% if release.version -%}
{% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/syn7xx/scoria/compare/{{ release.previous.version }}...{{ release.version }}
{% else -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/syn7xx/scoria/releases/tag/{{ release.version }}
{% endif -%}
{% else -%}
[Unreleased]: https://github.com/syn7xx/scoria/compare/{{ releases | map(attribute="version") | select | first }}...HEAD
{% endif -%}
{% endfor %}"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false   # include non-conventional commits too
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

# Map conventional commit types to changelog sections.
# Non-conventional commits fall into "Other Changes".
commit_parsers = [
  { message = "^feat",      group = "Added" },
  { message = "^add",       group = "Added" },
  { message = "^fix",       group = "Fixed" },
  { message = "^bug",       group = "Fixed" },
  { message = "^docs",      group = "Documentation" },
  { message = "^doc",       group = "Documentation" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactored" },
  { message = "^style",     group = "Styling" },
  { message = "^test",      group = "Testing" },
  { message = "^chore",     group = "Miscellaneous" },
  { message = "^ci",        group = "Miscellaneous" },
  { message = "^bump",      group = "Miscellaneous" },
  { message = "^revert",    group = "Reverted" },
  { message = ".*",         group = "Other Changes" },
]
