name: Release Dry Run

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DRY_TAG: v0.0.0-dryrun

jobs:
  build-and-package:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: scoria-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: scoria-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: scoria-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libappindicator3-dev

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Run Linux smoke script
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/smoke/linux.sh
          scripts/smoke/linux.sh "./target/${{ matrix.target }}/release/scoria"

      - name: Run macOS smoke script
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/smoke/macos.sh
          scripts/smoke/macos.sh "./target/${{ matrix.target }}/release/scoria"

      - name: Run Windows smoke script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -File scripts/smoke/windows.ps1 -Bin "target/${{ matrix.target }}/release/scoria.exe"

      - name: Package Unix artifacts
        if: runner.os != 'Windows'
        uses: ./.github/actions/unix-package
        with:
          target: ${{ matrix.target }}
          name: ${{ matrix.name }}

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        uses: ./.github/actions/windows-package
        with:
          target: ${{ matrix.target }}
          name: ${{ matrix.name }}
          tag: ${{ env.DRY_TAG }}

      - name: Upload dry-run unix artifacts
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: dry-run-${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

      - name: Upload dry-run windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: dry-run-${{ matrix.name }}
          path: |
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.sha256
            ${{ matrix.name }}.msi
            ${{ matrix.name }}.msi.sha256

  notes-dry-run:
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.12.0"
        run: |
          set -euo pipefail
          ARCHIVE="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          BASE_URL="https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}"
          curl -sL "${BASE_URL}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
          curl -sL "${BASE_URL}/${ARCHIVE}.sha512" -o "/tmp/${ARCHIVE}.sha512"
          EXPECTED_SHA512="$(awk '{print $1}' "/tmp/${ARCHIVE}.sha512" | tr -d '\r\n')"
          ACTUAL_SHA512="$(sha512sum "/tmp/${ARCHIVE}" | awk '{print $1}')"
          test -n "${EXPECTED_SHA512}"
          test "${EXPECTED_SHA512}" = "${ACTUAL_SHA512}"
          tar xzf "/tmp/${ARCHIVE}" -C /tmp
          sudo install -m755 "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff

      - name: Generate release notes dry-run
        run: |
          set -euo pipefail
          PREV="$(git tag -l 'v*' --sort=-version:refname | head -1 || true)"
          if [ -n "${PREV}" ]; then
            git-cliff --config cliff.github.toml --strip all --output RELEASE_NOTES_DRY_RUN.md -- "${PREV}..HEAD"
          else
            git-cliff --config cliff.github.toml --strip all --output RELEASE_NOTES_DRY_RUN.md
          fi
