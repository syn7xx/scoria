name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: scoria-linux-x86_64
          # Native ARM runner avoids glib-sys/pkg-config cross-compile (GTK .pc for arm64 on amd64).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: scoria-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: scoria-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: scoria-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libappindicator3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz scoria
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Full history + tags so git-cliff can list commits between releases.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.12.0"
        run: |
          set -euo pipefail
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /tmp
          sudo install -m755 "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PREV="$(git tag -l 'v*' --sort=-version:refname | grep -Fxv "$TAG" | head -1 || true)"
          if [ -n "${PREV}" ]; then
            # git-cliff 2.x: one --config; range is positional after --
            git-cliff --config cliff.github.toml \
              --strip all --output RELEASE_NOTES.md -- "${PREV}..${TAG}"
          else
            git-cliff --config cliff.github.toml \
              --tag "${TAG}" --strip all --output RELEASE_NOTES.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*.tar.gz
