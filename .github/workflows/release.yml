name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: scoria-linux-x86_64
          # Native ARM runner avoids glib-sys/pkg-config cross-compile (GTK .pc for arm64 on amd64).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: scoria-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: scoria-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: scoria-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libxdo-dev: link -lxdo (muda/tray-icon); xdotool alone is not enough for cargo link.
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libappindicator3-dev libxdo-dev xdotool

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz scoria
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
