<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4714A"/>
      <stop offset="100%" stop-color="#A0452A"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="30" y="28" width="68" height="80" rx="8" fill="none" stroke="#fff" stroke-width="6"/>
  <!-- Clipboard clip -->
  <rect x="46" y="18" width="36" height="18" rx="6" fill="none" stroke="#fff" stroke-width="6"/>
  <!-- Down arrow shaft -->
  <line x1="64" y1="52" x2="64" y2="86" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <!-- Down arrow head -->
  <polyline points="50,76 64,92 78,76" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
