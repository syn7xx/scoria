# GitHub Releases body (git-cliff): compact sections, no compare-link footer.
# Usage: git-cliff -c cliff.github.toml --strip all -o NOTES -- PREV..TAG

[changelog]
header = ""
footer = ""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | upper_first | trim_end }}\
{% if commit.breaking %} (**BREAKING**){% endif %}
{% endfor %}\
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat",      group = "Added" },
  { message = "^add",       group = "Added" },
  { message = "^fix",       group = "Fixed" },
  { message = "^bug",       group = "Fixed" },
  { message = "^docs",      group = "Documentation" },
  { message = "^doc",       group = "Documentation" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactored" },
  { message = "^style",     group = "Styling" },
  { message = "^test",      group = "Testing" },
  { message = "^chore",     group = "Miscellaneous" },
  { message = "^ci",        group = "Miscellaneous" },
  { message = "^bump",      group = "Miscellaneous" },
  { message = "^revert",    group = "Reverted" },
  { message = ".*",         group = "Other Changes" },
]
